<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>De Kinderkluis - Saldo</title>
  <style>
    body { margin:0; font-family:Arial,sans-serif; background:#eef4ff; color:#1e293b; padding:20px; }
    .wrap { max-width:900px; margin:0 auto; }
    .card { background:#fff; border-radius:18px; padding:24px; box-shadow:0 8px 24px rgba(0,0,0,.08); margin-bottom:18px; }
    .btn, button { display:inline-block; text-decoration:none; background:#2563eb; color:#fff; padding:10px 14px; border-radius:10px; border:none; cursor:pointer; font-size:1rem; margin-right:8px; margin-bottom:8px; }
    .btn-green { background:#16a34a; }
    .btn-red { background:#dc2626; }
    .saldo { font-size:2.5rem; font-weight:bold; color:#16a34a; margin:16px 0; }
    .muted { color:#64748b; }
    .field { margin-bottom:14px; }
    .field label { display:block; font-weight:bold; margin-bottom:6px; }
    .field input { width:100%; padding:12px; border:1px solid #cbd5e1; border-radius:10px; box-sizing:border-box; font-size:1rem; }
    .goal-item, .tx-item { padding:14px; border-radius:12px; background:#f8fbff; border:1px solid #dbe7ff; margin-bottom:10px; }
    .goal-actions { margin-top:10px; }
    .status, .error, .success, .loading { padding:12px; border-radius:12px; margin-top:12px; }
    .loading { background:#eff6ff; color:#1d4ed8; border:1px solid #bfdbfe; }
    .error { background:#fff1f2; color:#b91c1c; border:1px solid #fecdd3; }
    .success { background:#f0fdf4; color:#166534; border:1px solid #bbf7d0; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <a class="btn" href="index.html">← Start</a>
      <h1 id="title">De Kinderkluis</h1>
      <p class="muted">Jouw spaargeld en spaardoelen</p>
      <div class="saldo" id="saldo">Laden...</div>
      <div id="pageStatus" class="loading">Gegevens laden...</div>
    </div>

    <div class="card">
      <h2>Nieuw spaardoel maken</h2>
      <div class="field">
        <label for="newGoalName">Naam van je spaardoel</label>
        <input id="newGoalName" type="text" placeholder="Bijv. Lego auto">
      </div>
      <div class="field">
        <label for="newGoalAmount">Bedrag van je spaardoel</label>
        <input id="newGoalAmount" type="number" step="0.01" min="0" placeholder="Bijv. 15.00">
      </div>
      <button class="btn-green" type="button" onclick="saveGoal()">Spaardoel toevoegen</button>
      <div id="goalStatus" class="loading">Klaar om te laden...</div>
    </div>

    <div class="card">
      <h2>Mijn spaardoelen</h2>
      <div id="goalsBox"></div>
    </div>

    <div class="card">
      <h2>Laatste transacties</h2>
      <div id="transactions"></div>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyJN6X3xCKHd3SLgSdQjx69KVtjXwVRjGgx3CR0GCXWAdsK5xQ3pKvZcmXV8PElKpL2/exec";

    function euro(amount) {
      return new Intl.NumberFormat("nl-NL", { style: "currency", currency: "EUR" }).format(Number(amount || 0));
    }

    function formatDate(value) {
      const d = new Date(value);
      if (isNaN(d.getTime())) return value || "-";
      return new Intl.DateTimeFormat("nl-NL", {
        day: "2-digit", month: "2-digit", year: "numeric", hour: "2-digit", minute: "2-digit"
      }).format(d);
    }

    function setGoalStatus(message, cls) {
      const el = document.getElementById("goalStatus");
      el.className = cls;
      el.textContent = message;
    }

    async function apiGetState() {
      const response = await fetch(API_URL + "?action=state");
      const data = await response.json();
      if (!data.ok) throw new Error(data.error || "Fout bij laden");
      return data;
    }

    async function apiPost(payload) {
      const response = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload)
      });
      const data = await response.json();
      if (!data.ok) throw new Error(data.error || "Onbekende fout");
      return data;
    }

    function renderState(data) {
      document.getElementById("title").textContent = "De Kinderkluis van " + (data.childName || "Sem");
      document.getElementById("saldo").textContent = euro(data.balance);

      const goalsBox = document.getElementById("goalsBox");
      goalsBox.innerHTML = "";

      const activeGoals = (data.goals || []).filter(g => g.active);

      if (activeGoals.length === 0) {
        goalsBox.innerHTML = '<div class="muted">Nog geen actieve spaardoelen.</div>';
      } else {
        activeGoals.forEach(goal => {
          const remaining = Math.max(0, Number(goal.targetAmount || 0) - Number(data.balance || 0));
          const percent = Number(goal.targetAmount || 0) > 0
            ? Math.min(100, Math.round((Number(data.balance || 0) / Number(goal.targetAmount || 0)) * 100))
            : 0;

          const div = document.createElement("div");
          div.className = "goal-item";
          div.innerHTML = `
            <div><strong>${goal.name}</strong></div>
            <div class="muted">Doelbedrag: ${euro(goal.targetAmount)}</div>
            <div class="muted">Gespaard: ${euro(data.balance)}</div>
            <div class="muted">Nog nodig: ${euro(remaining)}</div>
            <div class="muted">Voortgang: ${percent}%</div>
            <div class="goal-actions">
              <button class="btn-red" onclick="toggleGoal('${goal.id}')">Verbergen</button>
            </div>
          `;
          goalsBox.appendChild(div);
        });
      }

      const txBox = document.getElementById("transactions");
      txBox.innerHTML = "";
      (data.transactions || []).slice(0, 10).forEach(tx => {
        const sign = tx.type === "bij" ? "+" : "-";
        const div = document.createElement("div");
        div.className = "tx-item";
        div.innerHTML = `
          <div><strong>${tx.note || tx.category || "Transactie"}</strong></div>
          <div class="muted">Categorie: ${tx.category || "-"}</div>
          <div class="muted">${formatDate(tx.createdAt)}</div>
          <div><strong>${sign} ${euro(tx.amount)}</strong></div>
        `;
        txBox.appendChild(div);
      });

      document.getElementById("pageStatus").className = "success";
      document.getElementById("pageStatus").textContent = "Gegevens geladen.";
    }

    async function loadData() {
      try {
        const data = await apiGetState();
        renderState(data);
        setGoalStatus("Je kunt hieronder nieuwe spaardoelen toevoegen.", "success");
      } catch (error) {
        document.getElementById("pageStatus").className = "error";
        document.getElementById("pageStatus").textContent = "Fout bij laden: " + error.message;
      }
    }

    async function saveGoal() {
      const goalName = document.getElementById("newGoalName").value.trim();
      const goalAmount = Number(document.getElementById("newGoalAmount").value);

      if (!goalName) {
        setGoalStatus("Vul een naam voor je spaardoel in.", "error");
        return;
      }

      if (!goalAmount || goalAmount <= 0) {
        setGoalStatus("Vul een geldig doelbedrag in.", "error");
        return;
      }

      try {
        setGoalStatus("Spaardoel opslaan...", "loading");
        const data = await apiPost({
          action: "addgoal",
          goalName: goalName,
          goalAmount: goalAmount
        });
        document.getElementById("newGoalName").value = "";
        document.getElementById("newGoalAmount").value = "";
        renderState(data);
        setGoalStatus("Nieuw spaardoel opgeslagen.", "success");
      } catch (error) {
        setGoalStatus("Fout bij opslaan: " + error.message, "error");
      }
    }

    async function toggleGoal(goalId) {
      try {
        const data = await apiPost({
          action: "togglegoal",
          goalId: goalId
        });
        renderState(data);
      } catch (error) {
        document.getElementById("pageStatus").className = "error";
        document.getElementById("pageStatus").textContent = "Fout: " + error.message;
      }
    }

    loadData();
  </script>
</body>
</html>
