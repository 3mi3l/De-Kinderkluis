<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>De Kinderkluis - Saldo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eef4ff;
      color: #1e293b;
      margin: 0;
      padding: 30px 20px;
    }
    .wrap {
      max-width: 700px;
      margin: 0 auto;
    }
    .card {
      background: white;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
      text-align: center;
    }
    h1 {
      margin-top: 0;
    }
    .saldo {
      font-size: 3rem;
      font-weight: bold;
      margin: 20px 0;
      color: #16a34a;
    }
    .goal {
      margin-top: 18px;
      font-size: 1.05rem;
    }
    .back {
      display: inline-block;
      margin-top: 20px;
      text-decoration: none;
      color: white;
      background: #2563eb;
      padding: 10px 16px;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>De Kinderkluis</h1>
      <p>Jouw saldo is nu:</p>
      <div class="saldo">€ 7,50</div>
      <div class="goal">Spaardoel: Lego set — nog € 4,50 te sparen</div>
      <a class="back" href="index.html">Terug</a>
    </div>
  </div>
</body>
</html>
