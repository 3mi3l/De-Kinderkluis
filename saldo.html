<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbyoEpe894fRAeV0Mxft7zzEIUcoNuwvfSpcr70fGoax9-PyLJUMBs81LjoQCQP6CQMT/exec";

  function euro(amount){
    return new Intl.NumberFormat("nl-NL", {
      style: "currency",
      currency: "EUR"
    }).format(Number(amount || 0));
  }

  function formatDate(iso){
    const date = new Date(iso);
    return new Intl.DateTimeFormat("nl-NL", {
      day: "2-digit",
      month: "2-digit",
      year: "numeric",
      hour: "2-digit",
      minute: "2-digit"
    }).format(date);
  }

  async function loadState(){
    const res = await fetch(API_URL + "?action=state");
    const data = await res.json();

    if (!data.ok) {
      throw new Error(data.error || "Fout bij laden");
    }

    document.getElementById("childTitle").textContent = `De Kinderkluis van ${data.childName}`;
    document.getElementById("saldoDisplay").textContent = euro(data.balance);
    document.getElementById("goalName").textContent = data.savingsGoalName;
    document.getElementById("goalAmount").textContent = euro(data.savingsGoalAmount);
    document.getElementById("savedAmount").textContent = euro(data.balance);

    const remaining = Math.max(0, Number(data.savingsGoalAmount) - Number(data.balance));
    document.getElementById("remainingAmount").textContent = euro(remaining);

    const percent = Number(data.savingsGoalAmount) > 0
      ? Math.min(100, Math.round((Number(data.balance) / Number(data.savingsGoalAmount)) * 100))
      : 0;

    document.getElementById("goalPercent").textContent = `${percent}%`;
    document.getElementById("progressBar").style.width = `${percent}%`;

    const txList = document.getElementById("txList");
    txList.innerHTML = "";

    if (!data.transactions || data.transactions.length === 0) {
      txList.innerHTML = `<div class="empty">Er zijn nog geen transacties.</div>`;
      return;
    }

    data.transactions.slice(0, 10).forEach(tx => {
      const div = document.createElement("div");
      div.className = "tx-item";

      const sign = tx.type === "bij" ? "+" : "-";
      const amountClass = tx.type === "bij" ? "plus" : "minus";

      div.innerHTML = `
        <div class="tx-left">
          <div class="tx-title">${tx.note || tx.category || "Transactie"}</div>
          <div class="tx-meta">
            Categorie: ${tx.category || "-"}<br>
            ${formatDate(tx.createdAt)}
          </div>
        </div>
        <div class="tx-amount ${amountClass}">${sign} ${euro(tx.amount)}</div>
      `;

      txList.appendChild(div);
    });
  }

  loadState().catch(err => {
    document.getElementById("saldoDisplay").textContent = "Fout";
    document.getElementById("txList").innerHTML = `<div class="empty">${err.message}</div>`;
  });
</script>
