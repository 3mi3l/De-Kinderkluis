<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>De Kinderkluis - Saldo</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eef4ff;
      color: #1e293b;
      padding: 20px;
    }

    .wrap {
      max-width: 800px;
      margin: 0 auto;
    }

    .card {
      background: #ffffff;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      margin-bottom: 18px;
    }

    h1, h2 {
      margin-top: 0;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      background: #2563eb;
      color: white;
      padding: 10px 14px;
      border-radius: 10px;
      margin-right: 8px;
      margin-bottom: 8px;
    }

    .saldo {
      font-size: 2.5rem;
      font-weight: bold;
      color: #16a34a;
      margin: 16px 0;
    }

    .muted {
      color: #64748b;
    }

    .tx-item {
      padding: 12px;
      border-radius: 12px;
      background: #f8fbff;
      border: 1px solid #dbe7ff;
      margin-bottom: 10px;
    }

    .plus {
      color: #16a34a;
      font-weight: bold;
    }

    .minus {
      color: #dc2626;
      font-weight: bold;
    }

    .error {
      background: #fff1f2;
      color: #b91c1c;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #fecdd3;
    }

    .loading {
      background: #eff6ff;
      color: #1d4ed8;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #bfdbfe;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <a class="btn" href="index.html">← Start</a>
      <a class="btn" href="ouder.html">Ouder beheer</a>

      <h1 id="title">De Kinderkluis</h1>
      <p class="muted">Jouw spaargeld en uitgaven</p>

      <div class="saldo" id="saldo">Laden...</div>

      <p><strong>Spaardoel:</strong> <span id="goalName">Laden...</span></p>
      <p><strong>Doelbedrag:</strong> <span id="goalAmount">Laden...</span></p>
      <p><strong>Nog nodig:</strong> <span id="remaining">Laden...</span></p>
    </div>

    <div class="card">
      <h2>Laatste transacties</h2>
      <div id="status" class="loading">Gegevens laden...</div>
      <div id="transactions"></div>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyoEpe894fRAeV0Mxft7zzEIUcoNuwvfSpcr70fGoax9-PyLJUMBs81LjoQCQP6CQMT/exec";

    function euro(amount) {
      return new Intl.NumberFormat("nl-NL", {
        style: "currency",
        currency: "EUR"
      }).format(Number(amount || 0));
    }

    function formatDate(value) {
      const d = new Date(value);
      if (isNaN(d.getTime())) return value || "-";
      return new Intl.DateTimeFormat("nl-NL", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      }).format(d);
    }

    async function loadData() {
      const status = document.getElementById("status");
      const txBox = document.getElementById("transactions");

      try {
        status.textContent = "Gegevens laden...";

        const response = await fetch(API_URL + "?action=state", {
          method: "GET"
        });

        const text = await response.text();
        let data;

        try {
          data = JSON.parse(text);
        } catch (jsonError) {
          throw new Error("API gaf geen geldige JSON terug: " + text);
        }

        if (!data.ok) {
          throw new Error(data.error || "Onbekende fout vanuit Apps Script");
        }

        document.getElementById("title").textContent = "De Kinderkluis van " + (data.childName || "Sem");
        document.getElementById("saldo").textContent = euro(data.balance);
        document.getElementById("goalName").textContent = data.savingsGoalName || "-";
        document.getElementById("goalAmount").textContent = euro(data.savingsGoalAmount);

        const remaining = Math.max(0, Number(data.savingsGoalAmount || 0) - Number(data.balance || 0));
        document.getElementById("remaining").textContent = euro(remaining);

        status.style.display = "none";
        txBox.innerHTML = "";

        if (!data.transactions || data.transactions.length === 0) {
          txBox.innerHTML = '<div class="muted">Nog geen transacties gevonden.</div>';
          return;
        }

        data.transactions.slice(0, 10).forEach(function(tx) {
          const sign = tx.type === "bij" ? "+" : "-";
          const cls = tx.type === "bij" ? "plus" : "minus";

          const div = document.createElement("div");
          div.className = "tx-item";
          div.innerHTML =
            "<div><strong>" + (tx.note || tx.category || "Transactie") + "</strong></div>" +
            "<div class='muted'>Categorie: " + (tx.category || "-") + "</div>" +
            "<div class='muted'>" + formatDate(tx.createdAt) + "</div>" +
            "<div class='" + cls + "'>" + sign + " " + euro(tx.amount) + "</div>";

          txBox.appendChild(div);
        });

      } catch (error) {
        status.className = "error";
        status.textContent = "Fout bij laden: " + error.message;
        console.error(error);
      }
    }

    loadData();
  </script>
</body>
</html>
