<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>De Kinderkluis</title>
  <style>
    :root{
      --bg:#f3f7ff;
      --card:#ffffff;
      --text:#172033;
      --muted:#5e6b85;
      --primary:#2b6fff;
      --primary-dark:#1f57cc;
      --success:#16a34a;
      --shadow:0 12px 32px rgba(16,24,40,.12);
      --radius:20px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(180deg,#eef4ff 0%, #f8fbff 100%);
      color:var(--text);
    }
    .wrap{
      max-width:1000px;
      margin:0 auto;
      padding:28px 18px 40px;
    }
    .hero,.card{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:24px;
    }
    .hero{margin-bottom:20px;}
    h1,h2{margin-top:0;}
    .tagline{
      margin:0 0 18px;
      color:var(--muted);
    }
    .status-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:14px;
      margin:20px 0 24px;
    }
    .stat{
      background:#f7faff;
      border:1px solid #e5edff;
      border-radius:16px;
      padding:16px;
    }
    .stat-label{
      color:var(--muted);
      font-size:.95rem;
      margin-bottom:6px;
    }
    .stat-value{
      font-size:1.25rem;
      font-weight:700;
      line-height:1.3;
    }
    .actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }
    .btn{
      display:inline-block;
      text-decoration:none;
      padding:14px 18px;
      border-radius:14px;
      font-weight:700;
      font-size:1rem;
    }
    .btn-primary{
      background:var(--primary);
      color:#fff;
    }
    .btn-secondary{
      background:#eef3ff;
      color:var(--primary);
    }
    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
    }
    .goal-item,.chore-item{
      background:#f8fbff;
      border:1px solid #dbe7ff;
      border-radius:14px;
      padding:14px;
      margin-bottom:10px;
    }
    .item-title{
      font-weight:700;
      margin-bottom:4px;
    }
    .item-meta{
      color:var(--muted);
      font-size:.92rem;
      line-height:1.5;
    }
    .small{
      color:var(--muted);
      font-size:.95rem;
      line-height:1.5;
    }
    .status{
      margin-top:14px;
      color:var(--muted);
      font-size:.95rem;
    }
    @media (max-width: 820px){
      .grid{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>De Kinderkluis</h1>
      <p class="tagline">Scan. Kijk. Spaar. Verdien.</p>

      <div class="status-grid">
        <div class="stat">
          <div class="stat-label">Huidig saldo</div>
          <div class="stat-value" id="homeSaldo">Laden...</div>
        </div>
        <div class="stat">
          <div class="stat-label">Actieve spaardoelen</div>
          <div class="stat-value" id="homeGoalsCount">Laden...</div>
        </div>
        <div class="stat">
          <div class="stat-label">Beschikbare klusjes</div>
          <div class="stat-value" id="homeChoresCount">Laden...</div>
        </div>
      </div>

      <div class="actions">
        <a class="btn btn-primary" href="saldo.html">Bekijk saldo</a>
        <a class="btn btn-secondary" href="ouder.html">Ouder beheer</a>
      </div>

      <div class="status" id="pageStatus">Gegevens laden...</div>
    </section>

    <section class="grid">
      <div class="card">
        <h2>Actieve spaardoelen</h2>
        <div id="goalsList">
          <div class="small">Gegevens laden...</div>
        </div>
      </div>

      <div class="card">
        <h2>Populaire klusjes</h2>
        <div id="choresList">
          <div class="small">Gegevens laden...</div>
        </div>
      </div>
    </section>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyJN6X3xCKHd3SLgSdQjx69KVtjXwVRjGgx3CR0GCXWAdsK5xQ3pKvZcmXV8PElKpL2/exec";

    function euro(amount){
      return new Intl.NumberFormat("nl-NL", {
        style: "currency",
        currency: "EUR"
      }).format(Number(amount || 0));
    }

    async function loadState(){
      const response = await fetch(API_URL + "?action=state");
      const data = await response.json();

      if (!data.ok) throw new Error(data.error || "Fout bij laden");

      const activeGoals = (data.goals || []).filter(goal => goal.active);
      const activeChores = (data.chores || []).filter(chore => chore.active);

      document.getElementById("homeSaldo").textContent = euro(data.balance);
      document.getElementById("homeGoalsCount").textContent = String(activeGoals.length);
      document.getElementById("homeChoresCount").textContent = String(activeChores.length);
      document.getElementById("pageStatus").textContent = "Gegevens geladen.";

      const goalsList = document.getElementById("goalsList");
      goalsList.innerHTML = "";

      if (activeGoals.length === 0) {
        goalsList.innerHTML = `<div class="small">Er zijn nog geen actieve spaardoelen.</div>`;
      } else {
        activeGoals.slice(0, 5).forEach(goal => {
          const remaining = Math.max(0, Number(goal.targetAmount || 0) - Number(data.balance || 0));
          const div = document.createElement("div");
          div.className = "goal-item";
          div.innerHTML = `
            <div class="item-title">${goal.name}</div>
            <div class="item-meta">
              Doelbedrag: ${euro(goal.targetAmount)}<br>
              Nog nodig: ${euro(remaining)}
            </div>
          `;
          goalsList.appendChild(div);
        });
      }

      const choresList = document.getElementById("choresList");
      choresList.innerHTML = "";

      if (activeChores.length === 0) {
        choresList.innerHTML = `<div class="small">Er zijn nog geen actieve klusjes.</div>`;
      } else {
        activeChores.slice(0, 6).forEach(chore => {
          const div = document.createElement("div");
          div.className = "chore-item";
          div.innerHTML = `
            <div class="item-title">${chore.name}</div>
            <div class="item-meta">
              Beloning: ${euro(chore.reward)}<br>
              Schermtijdwaarde: ${chore.screenMinutes || 0} minuten
            </div>
          `;
          choresList.appendChild(div);
        });
      }
    }

    loadState().catch(err => {
      document.getElementById("homeSaldo").textContent = "Fout";
      document.getElementById("homeGoalsCount").textContent = "Fout";
      document.getElementById("homeChoresCount").textContent = "Fout";
      document.getElementById("pageStatus").textContent = "Fout bij laden: " + err.message;
      console.error(err);
    });
  </script>
</body>
</html>
