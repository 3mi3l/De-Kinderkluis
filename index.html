<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>De Kinderkluis</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #1e293b;
      margin: 0;
      padding: 30px 20px;
    }
    .wrap {
      max-width: 800px;
      margin: 0 auto;
    }
    .card {
      background: #fff;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    }
    h1 {
      margin-top: 0;
      font-size: 2rem;
    }
    p {
      line-height: 1.5;
    }
    .buttons {
      margin-top: 24px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .btn {
      text-decoration: none;
      background: #2563eb;
      color: white;
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: 600;
      display: inline-block;
    }
    .muted {
      margin-top: 20px;
      color: #64748b;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>De Kinderkluis</h1>
      <p>Welkom bij De Kinderkluis. Hier kan saldo bekeken worden en kunnen ouders geld af- en bijschrijven.</p>

      <div class="buttons">
        <a class="btn" href="saldo.html">Bekijk saldo</a>
        <a class="btn" href="ouder.html">Ouder beheer</a>
      </div>

      <p class="muted">Eerste proefversie van jullie familiebank.</p>
    </div>
  </div>
</body>
</html>
