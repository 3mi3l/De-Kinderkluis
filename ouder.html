<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>De Kinderkluis - Ouder beheer</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eef4ff;
      color: #1e293b;
      padding: 20px;
    }

    .wrap {
      max-width: 950px;
      margin: 0 auto;
    }

    .card {
      background: #ffffff;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      margin-bottom: 18px;
    }

    h1, h2 {
      margin-top: 0;
    }

    .btn, button {
      display: inline-block;
      text-decoration: none;
      background: #2563eb;
      color: white;
      padding: 10px 14px;
      border-radius: 10px;
      margin-right: 8px;
      margin-bottom: 8px;
      border: none;
      cursor: pointer;
      font-size: 1rem;
    }

    .btn-secondary {
      background: #475569;
    }

    .btn-danger {
      background: #dc2626;
    }

    .btn-green {
      background: #16a34a;
    }

    .btn-red {
      background: #dc2626;
    }

    .saldo {
      font-size: 2rem;
      font-weight: bold;
      color: #0f172a;
      margin: 16px 0;
    }

    .muted {
      color: #64748b;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 18px;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      box-sizing: border-box;
      font-size: 1rem;
    }

    .field textarea {
      min-height: 90px;
      resize: vertical;
    }

    .quick-buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }

    .tx-item {
      padding: 12px;
      border-radius: 12px;
      background: #f8fbff;
      border: 1px solid #dbe7ff;
      margin-bottom: 10px;
    }

    .plus {
      color: #16a34a;
      font-weight: bold;
    }

    .minus {
      color: #dc2626;
      font-weight: bold;
    }

    .error {
      background: #fff1f2;
      color: #b91c1c;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #fecdd3;
      margin-top: 12px;
    }

    .success {
      background: #f0fdf4;
      color: #166534;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #bbf7d0;
      margin-top: 12px;
    }

    .loading {
      background: #eff6ff;
      color: #1d4ed8;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #bfdbfe;
      margin-top: 12px;
    }

    @media (max-width: 800px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .quick-buttons {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <a class="btn" href="index.html">← Start</a>
      <a class="btn btn-secondary" href="saldo.html">Bekijk saldo</a>

      <h1>Ouder beheer</h1>
      <p class="muted">Geld af- en bijschrijven voor De Kinderkluis.</p>

      <div><strong>Kind:</strong> <span id="childName">Laden...</span></div>
      <div class="saldo">Huidig saldo: <span id="balance">Laden...</span></div>
      <div><strong>Spaardoel:</strong> <span id="goalName">Laden...</span></div>
      <div><strong>Doelbedrag:</strong> <span id="goalAmount">Laden...</span></div>

      <div id="status" class="loading">Gegevens laden...</div>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Transactie invoeren</h2>

        <div class="quick-buttons">
          <button class="btn-green" type="button" onclick="setQuick('bij', 0.50)">+ € 0,50</button>
          <button class="btn-green" type="button" onclick="setQuick('bij', 1.00)">+ € 1,00</button>
          <button class="btn-red" type="button" onclick="setQuick('af', 0.50)">- € 0,50</button>
          <button class="btn-red" type="button" onclick="setQuick('af', 1.00)">- € 1,00</button>
        </div>

        <div class="field">
          <label for="type">Type</label>
          <select id="type">
            <option value="bij">Bijschrijven</option>
            <option value="af">Afschrijven</option>
          </select>
        </div>

        <div class="field">
          <label for="amount">Bedrag</label>
          <input id="amount" type="number" step="0.01" min="0" placeholder="Bijv. 1.50">
        </div>

        <div class="field">
          <label for="category">Categorie</label>
          <select id="category">
            <option value="weekgeld">Weekgeld</option>
            <option value="klusje">Klusje</option>
            <option value="snoep">Snoep</option>
            <option value="speelgoed">Speelgoed</option>
            <option value="schermtijd">Schermtijd</option>
            <option value="bonus">Bonus</option>
            <option value="correctie">Correctie</option>
            <option value="sparen">Sparen</option>
          </select>
        </div>

        <div class="field">
          <label for="device">Apparaat / ouder</label>
          <input id="device" type="text" placeholder="Bijv. vader iPhone">
        </div>

        <div class="field">
          <label for="note">Omschrijving</label>
          <textarea id="note" placeholder="Bijv. tafel gedekt, ijsje gekocht, weekgeld zondag"></textarea>
        </div>

        <button type="button" onclick="saveTransaction()">Transactie opslaan</button>
      </div>

      <div class="card">
        <h2>Snelacties</h2>

        <button type="button" class="btn-green" onclick="quickTransaction('bij', 2.00, 'weekgeld', 'Weekgeld', 'snelknop')">+ Weekgeld € 2,00</button>
        <button type="button" class="btn-green" onclick="quickTransaction('bij', 1.00, 'klusje', 'Klusje gedaan', 'snelknop')">+ Klusje € 1,00</button>
        <button type="button" class="btn-red" onclick="quickTransaction('af', 0.50, 'snoep', 'Snoep', 'snelknop')">- Snoep € 0,50</button>
        <button type="button" class="btn-red" onclick="quickTransaction('af', 1.00, 'schermtijd', 'Extra schermtijd', 'snelknop')">- Schermtijd € 1,00</button>

        <hr style="margin:20px 0; border:none; border-top:1px solid #e2e8f0;">

        <h2>Spaardoel aanpassen</h2>

        <div class="field">
          <label for="newGoalName">Nieuw spaardoel</label>
          <input id="newGoalName" type="text" placeholder="Bijv. Lego set">
        </div>

        <div class="field">
          <label for="newGoalAmount">Nieuw doelbedrag</label>
          <input id="newGoalAmount" type="number" step="0.01" min="0" placeholder="Bijv. 15.00">
        </div>

        <button type="button" onclick="updateGoal()">Spaardoel opslaan</button>

        <hr style="margin:20px 0; border:none; border-top:1px solid #e2e8f0;">

        <button type="button" class="btn-danger" onclick="resetDemo()">Demo resetten</button>
      </div>
    </div>

    <div class="card">
      <h2>Laatste transacties</h2>
      <div id="transactions"></div>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyoEpe894fRAeV0Mxft7zzEIUcoNuwvfSpcr70fGoax9-PyLJUMBs81LjoQCQP6CQMT/exec";

    function euro(amount) {
      return new Intl.NumberFormat("nl-NL", {
        style: "currency",
        currency: "EUR"
      }).format(Number(amount || 0));
    }

    function formatDate(value) {
      const d = new Date(value);
      if (isNaN(d.getTime())) return value || "-";
      return new Intl.DateTimeFormat("nl-NL", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      }).format(d);
    }

    function setStatus(message, type) {
      const status = document.getElementById("status");
      status.className = type;
      status.textContent = message;
    }

    function setQuick(type, amount) {
      document.getElementById("type").value = type;
      document.getElementById("amount").value = amount.toFixed(2);
    }

    async function apiGetState() {
      const response = await fetch(API_URL + "?action=state");
      const text = await response.text();
      const data = JSON.parse(text);

      if (!data.ok) {
        throw new Error(data.error || "Fout bij laden");
      }

      return data;
    }

    async function apiPost(payload) {
      const response = await fetch(API_URL, {
        method: "POST",
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify(payload)
      });

      const text = await response.text();
      const data = JSON.parse(text);

      if (!data.ok) {
        throw new Error(data.error || "Onbekende fout");
      }

      return data;
    }

    function renderState(data) {
      document.getElementById("childName").textContent = data.childName || "-";
      document.getElementById("balance").textContent = euro(data.balance);
      document.getElementById("goalName").textContent = data.savingsGoalName || "-";
      document.getElementById("goalAmount").textContent = euro(data.savingsGoalAmount);

      document.getElementById("newGoalName").value = data.savingsGoalName || "";
      document.getElementById("newGoalAmount").value = Number(data.savingsGoalAmount || 0).toFixed(2);

      const txBox = document.getElementById("transactions");
      txBox.innerHTML = "";

      if (!data.transactions || data.transactions.length === 0) {
        txBox.innerHTML = '<div class="muted">Nog geen transacties gevonden.</div>';
        return;
      }

      data.transactions.slice(0, 15).forEach(function(tx) {
        const sign = tx.type === "bij" ? "+" : "-";
        const cls = tx.type === "bij" ? "plus" : "minus";

        const div = document.createElement("div");
        div.className = "tx-item";
        div.innerHTML =
          "<div><strong>" + (tx.note || tx.category || "Transactie") + "</strong></div>" +
          "<div class='muted'>Categorie: " + (tx.category || "-") + "</div>" +
          "<div class='muted'>Apparaat: " + (tx.device || "-") + "</div>" +
          "<div class='muted'>" + formatDate(tx.createdAt) + "</div>" +
          "<div class='" + cls + "'>" + sign + " " + euro(tx.amount) + "</div>";

        txBox.appendChild(div);
      });
    }

    async function loadState() {
      try {
        setStatus("Gegevens laden...", "loading");
        const data = await apiGetState();
        renderState(data);
        setStatus("Gegevens geladen.", "success");
      } catch (error) {
        console.error(error);
        setStatus("Fout bij laden: " + error.message, "error");
      }
    }

    async function saveTransaction() {
      const type = document.getElementById("type").value;
      const amount = Number(document.getElementById("amount").value);
      const category = document.getElementById("category").value;
      const device = document.getElementById("device").value.trim() || "onbekend";
      const note = document.getElementById("note").value.trim();

      if (!amount || amount <= 0) {
        setStatus("Voer een geldig bedrag in.", "error");
        return;
      }

      try {
        setStatus("Transactie opslaan...", "loading");

        const data = await apiPost({
          action: "transaction",
          type: type,
          amount: amount,
          category: category,
          note: note,
          device: device
        });

        renderState(data);
        setStatus("Transactie opgeslagen.", "success");

        document.getElementById("amount").value = "";
        document.getElementById("note").value = "";
      } catch (error) {
        console.error(error);
        setStatus("Fout bij opslaan: " + error.message, "error");
      }
    }

    async function quickTransaction(type, amount, category, note, device) {
      try {
        setStatus("Transactie opslaan...", "loading");

        const data = await apiPost({
          action: "transaction",
          type: type,
          amount: amount,
          category: category,
          note: note,
          device: device
        });

        renderState(data);
        setStatus("Transactie opgeslagen.", "success");
      } catch (error) {
        console.error(error);
        setStatus("Fout bij opslaan: " + error.message, "error");
      }
    }

    async function updateGoal() {
      const goalName = document.getElementById("newGoalName").value.trim();
      const goalAmount = Number(document.getElementById("newGoalAmount").value);

      if (!goalName) {
        setStatus("Vul een spaardoel in.", "error");
        return;
      }

      if (!goalAmount || goalAmount <= 0) {
        setStatus("Vul een geldig doelbedrag in.", "error");
        return;
      }

      try {
        setStatus("Spaardoel opslaan...", "loading");

        const data = await apiPost({
          action: "updategoal",
          goalName: goalName,
          goalAmount: goalAmount
        });

        renderState(data);
        setStatus("Spaardoel opgeslagen.", "success");
      } catch (error) {
        console.error(error);
        setStatus("Fout bij spaardoel opslaan: " + error.message, "error");
      }
    }

    async function resetDemo() {
      const ok = confirm("Weet je zeker dat je de demo wilt resetten?");
      if (!ok) return;

      try {
        setStatus("Demo resetten...", "loading");

        const data = await apiPost({
          action: "resetdemo"
        });

        renderState(data);
        setStatus("Demo gereset.", "success");
      } catch (error) {
        console.error(error);
        setStatus("Fout bij resetten: " + error.message, "error");
      }
    }

    loadState();
  </script>
</body>
</html>
